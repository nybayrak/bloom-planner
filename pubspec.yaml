name: bloom_planner
description: A rolling perpetual planner — habit tracker, goal setter, and life organiser.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State management ─────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Local database (offline-first) ───────────────────────────
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # ── Firebase (cloud sync + auth) ─────────────────────────────
  firebase_core: ^2.31.1
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.4
  firebase_storage: ^11.7.5
  firebase_messaging: ^14.9.4
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  # ── Navigation ───────────────────────────────────────────────
  go_router: ^13.2.3

  # ── UI & Animation ───────────────────────────────────────────
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  confetti: ^0.7.0

  # ── Media & assets ───────────────────────────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

  # ── Utilities ────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.2.1+2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.1

  # ── Input & voice ────────────────────────────────────────────
  speech_to_text: ^6.6.2
  flutter_colorpicker: ^1.1.0
  emoji_picker_flutter: ^2.2.0

  # ── Monetisation ─────────────────────────────────────────────
  purchases_flutter: ^7.4.0  # RevenueCat

  # ── Home widgets ─────────────────────────────────────────────
  home_widget: ^0.5.0

  # ── Dev convenience ──────────────────────────────────────────
  freezed_annotation: ^2.4.2
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0+1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/stickers/

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-Italic.ttf
          style: italic

    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat-Regular.ttf
        - asset: assets/fonts/Caveat-Bold.ttf
          weight: 700

    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
