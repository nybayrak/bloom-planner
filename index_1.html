<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bloom Planner">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#E8A598">
  <title>🌸 Bloom Planner</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FFF5F3;overflow-x:hidden}
    #root{max-width:430px;margin:0 auto;min-height:100vh}
    input,textarea,select,button{font-family:inherit}
    ::-webkit-scrollbar{display:none}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const{useState,useEffect}=React;
const T={pr:'#E8A598',pd:'#C87D6A',pl:'#FFF0ED',ac:'#9B7EBD',al:'#F0EBF8',bg:'#FFF5F3',ca:'#FFFFFF',tx:'#3D2B1F',mu:'#9B8578',su:'#82C09A',da:'#E88A8A',wa:'#F5C842',bo:'#F0DDD8'};
const db={
  get(k){try{return JSON.parse(localStorage.getItem(k))||[];}catch{return[];}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36);
const tod=()=>new Date().toISOString().slice(0,10);
const fmtD=(d)=>{try{return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch{return d;}};
const fmtT=(t)=>{if(!t)return'';const[h,m]=t.split(':');const hr=parseInt(h);return`${hr%12||12}:${m} ${hr>=12?'PM':'AM'}`;};
const S={
  app:{fontFamily:'inherit',backgroundColor:T.bg,minHeight:'100vh',maxWidth:'430px',margin:'0 auto',paddingBottom:'72px'},
  hdr:{background:`linear-gradient(135deg,${T.pr},${T.pd})`,padding:'14px 16px',color:'white'},
  crd:{background:T.ca,borderRadius:'16px',padding:'14px 16px',marginBottom:'10px',boxShadow:'0 1px 6px rgba(200,125,106,0.10)',border:`1px solid ${T.bo}`},
  btn:{background:`linear-gradient(135deg,${T.pr},${T.pd})`,color:'white',border:'none',borderRadius:'12px',padding:'10px 18px',cursor:'pointer',fontWeight:'700',fontSize:'14px'},
  bsm:{background:`linear-gradient(135deg,${T.pr},${T.pd})`,color:'white',border:'none',borderRadius:'10px',padding:'7px 14px',cursor:'pointer',fontWeight:'600',fontSize:'13px'},
  bot:{background:'transparent',color:T.pr,border:`2px solid ${T.pr}`,borderRadius:'12px',padding:'8px 16px',cursor:'pointer',fontWeight:'600',fontSize:'13px'},
  inp:{width:'100%',border:`1.5px solid ${T.bo}`,borderRadius:'10px',padding:'10px 12px',fontSize:'14px',outline:'none',boxSizing:'border-box',marginBottom:'10px',background:T.bg,color:T.tx,fontFamily:'inherit'},
  lbl:{fontSize:'11px',fontWeight:'700',color:T.mu,textTransform:'uppercase',letterSpacing:'0.8px',display:'block',marginBottom:'5px'},
  nav:{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:'430px',background:'white',borderTop:`1.5px solid ${T.bo}`,display:'flex',zIndex:100},
  mod:{position:'fixed',inset:0,background:'rgba(61,43,31,0.45)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'},
  mox:{background:'white',borderRadius:'24px 24px 0 0',padding:'20px 20px 36px',width:'100%',maxWidth:'430px',maxHeight:'88vh',overflowY:'auto'},
  sec:{padding:'14px 14px 0'},
  pil:(a)=>({padding:'6px 14px',borderRadius:'999px',border:'none',cursor:'pointer',fontWeight:'600',fontSize:'13px',background:a?T.pr:T.bo,color:a?'white':T.mu}),
};

const TABS=[{id:'home',ic:'🏠',lb:'Home'},{id:'calendar',ic:'📅',lb:'Calendar'},{id:'habits',ic:'✨',lb:'Habits'},{id:'tasks',ic:'✅',lb:'Tasks'},{id:'more',ic:'⋯',lb:'More'}];

function HomeTab(){
  const[mood,setMood]=useState(null);
  const[water,setWater]=useState(0);
  const[tasks,setTasks]=useState([]);
  const[habits,setHabits]=useState([]);
  const[logs,setLogs]=useState([]);
  const today=tod();
  useEffect(()=>{
    setTasks(db.get('bp_tasks').filter(x=>!x.completed).slice(0,5));
    setHabits(db.get('bp_habits').filter(x=>x.active));
    setLogs(db.get('bp_hlogs'));
    const tm=db.get('bp_moods').find(x=>x.date===today);if(tm)setMood(tm.level);
    const tw=db.get('bp_water').find(x=>x.date===today);if(tw)setWater(tw.amount);
  },[]);
  const saveMood=(lv)=>{setMood(lv);const m=db.get('bp_moods');db.set('bp_moods',[...m.filter(x=>x.date!==today),{id:uid(),date:today,level:lv}]);};
  const addWater=()=>{const n=Math.min(water+250,3000);setWater(n);const w=db.get('bp_water');db.set('bp_water',[...w.filter(x=>x.date!==today),{id:uid(),date:today,amount:n}]);};
  const doneH=habits.filter(h=>logs.some(l=>l.habitId===h.id&&l.date===today));
  const MOODS=[['😢','Rough'],['😕','Meh'],['😐','Okay'],['🙂','Good'],['😄','Great']];
  const hr=new Date().getHours();
  const gr=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  return(
    <div style={S.sec}>
      <div style={{...S.crd,background:`linear-gradient(135deg,${T.pl},${T.al})`,border:'none'}}>
        <p style={{margin:0,color:T.mu,fontSize:'13px'}}>{new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</p>
        <h2 style={{margin:'4px 0 0',color:T.tx,fontSize:'22px',fontWeight:'700'}}>{gr} 🌸</h2>
      </div>
      <div style={S.crd}>
        <p style={{margin:'0 0 10px',fontWeight:'700',color:T.pr,fontSize:'14px'}}>😊 Today's Mood</p>
        <div style={{display:'flex',justifyContent:'space-between'}}>
          {MOODS.map(([em,lb],i)=>(
            <button key={i} onClick={()=>saveMood(i)} style={{background:mood===i?T.pl:'transparent',border:`2px solid ${mood===i?T.pr:T.bo}`,borderRadius:'14px',padding:'8px 4px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',flex:1,margin:'0 2px'}}>
              <span style={{fontSize:'26px'}}>{em}</span>
              <span style={{fontSize:'10px',color:mood===i?T.pr:T.mu,fontWeight:'600'}}>{lb}</span>
            </button>
          ))}
        </div>
      </div>
      <div style={S.crd}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
          <p style={{margin:0,fontWeight:'700',color:T.pr,fontSize:'14px'}}>💧 Water Tracker</p>
          <span style={{fontWeight:'700',color:T.tx,fontSize:'13px'}}>{water} / 2000 ml</span>
        </div>
        <div style={{background:T.bo,borderRadius:'999px',height:'10px',marginBottom:'10px',overflow:'hidden'}}>
          <div style={{background:'linear-gradient(90deg,#74b9ff,#0984e3)',width:`${Math.min(water/20,100)}%`,height:'100%',borderRadius:'999px',transition:'width 0.4s'}}/>
        </div>
        <button onClick={addWater} style={{...S.btn,width:'100%'}}>+ Add 250 ml 💧</button>
      </div>
      <div style={S.crd}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
          <p style={{margin:0,fontWeight:'700',color:T.pr,fontSize:'14px'}}>✨ Today's Habits</p>
          <span style={{fontSize:'12px',color:T.mu}}>{doneH.length}/{habits.length}</span>
        </div>
        {habits.length===0?<p style={{color:T.mu,fontSize:'13px',margin:0}}>No habits yet — add some in the Habits tab!</p>:<>
          <div style={{background:T.bo,borderRadius:'999px',height:'6px',marginBottom:'10px'}}>
            <div style={{background:T.su,width:`${habits.length?doneH.length/habits.length*100:0}%`,height:'100%',borderRadius:'999px',transition:'width 0.4s'}}/>
          </div>
          {habits.slice(0,5).map(h=>{const done=logs.some(l=>l.habitId===h.id&&l.date===today);return(
            <div key={h.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'6px 0',borderBottom:`1px solid ${T.bo}`}}>
              <span style={{fontSize:'18px'}}>{h.emoji||'🌸'}</span>
              <span style={{flex:1,fontSize:'14px',color:done?T.mu:T.tx,textDecoration:done?'line-through':'none'}}>{h.name}</span>
              {done&&<span style={{color:T.su,fontSize:'16px'}}>✓</span>}
            </div>
          );})}
        </>}
      </div>
      <div style={S.crd}>
        <p style={{margin:'0 0 8px',fontWeight:'700',color:T.pr,fontSize:'14px'}}>✅ Upcoming Tasks</p>
        {tasks.length===0?<p style={{color:T.mu,fontSize:'13px',margin:0}}>No tasks — add some in the Tasks tab!</p>
        :tasks.map(t=>(
          <div key={t.id} style={{display:'flex',alignItems:'center',gap:'8px',padding:'6px 0',borderBottom:`1px solid ${T.bo}`}}>
            <span style={{fontSize:'14px'}}>{t.priority==='high'?'🔴':t.priority==='medium'?'🟡':'🟢'}</span>
            <div style={{flex:1}}>
              <p style={{margin:0,fontSize:'14px',color:T.tx}}>{t.title}</p>
              {t.dueDate&&<p style={{margin:0,fontSize:'11px',color:T.mu}}>Due {fmtD(t.dueDate)}</p>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CalendarTab(){
  const[events,setEvents]=useState([]);
  const[cur,setCur]=useState(new Date());
  const[sel,setSel]=useState(tod());
  const[show,setShow]=useState(false);
  const[form,setForm]=useState({title:'',description:'',time:'09:00',color:T.pr});
  useEffect(()=>{setEvents(db.get('bp_events'));},[]);
  const yr=cur.getFullYear(),mo=cur.getMonth();
  const firstDow=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const evOn=(ds)=>events.filter(e=>e.date===ds);
  const selEvs=evOn(sel).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const save=()=>{
    if(!form.title.trim())return;
    const e={id:uid(),date:sel,...form};
    const upd=[...events,e];setEvents(upd);db.set('bp_events',upd);
    setForm({title:'',description:'',time:'09:00',color:T.pr});setShow(false);
  };
  const del=(id)=>{const upd=events.filter(e=>e.id!==id);setEvents(upd);db.set('bp_events',upd);};
  const COLS=[T.pr,'#82C09A','#74b9ff','#a29bfe','#fd79a8','#fdcb6e'];
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let i=1;i<=dim;i++)cells.push(i);
  return(
    <div style={S.sec}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
        <button onClick={()=>setCur(new Date(yr,mo-1,1))} style={{...S.bot,padding:'7px 14px'}}>‹</button>
        <h3 style={{margin:0,color:T.tx,fontSize:'17px',fontWeight:'700'}}>{cur.toLocaleString('default',{month:'long',year:'numeric'})}</h3>
        <button onClick={()=>setCur(new Date(yr,mo+1,1))} style={{...S.bot,padding:'7px 14px'}}>›</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'2px',marginBottom:'2px'}}>
        {['S','M','T','W','T','F','S'].map((d,i)=><div key={i} style={{textAlign:'center',fontSize:'11px',color:T.mu,fontWeight:'700',padding:'3px 0'}}>{d}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px',marginBottom:'14px'}}>
        {cells.map((day,i)=>{
          if(!day)return<div key={i}/>;
          const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const isT=ds===tod(),isS=ds===sel,hasE=evOn(ds).length>0;
          return(
            <button key={i} onClick={()=>setSel(ds)} style={{border:'none',borderRadius:'10px',padding:'6px 2px',cursor:'pointer',background:isS?T.pr:isT?T.pl:'transparent',color:isS?'white':T.tx,fontSize:'13px',fontWeight:isT?'700':'400',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px'}}>
              {day}
              {hasE&&<div style={{width:'5px',height:'5px',borderRadius:'50%',background:isS?'rgba(255,255,255,0.8)':T.pr}}/>}
            </button>
          );
        })}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
        <p style={{margin:0,fontWeight:'700',color:T.tx,fontSize:'15px'}}>{new Date(sel+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</p>
        <button onClick={()=>setShow(true)} style={S.bsm}>+ Add</button>
      </div>
      {selEvs.length===0
        ?<div style={{...S.crd,textAlign:'center',padding:'28px 20px'}}><p style={{fontSize:'32px',margin:'0 0 6px'}}>📭</p><p style={{color:T.mu,margin:0,fontSize:'14px'}}>No events — tap <strong>+ Add</strong> to create one!</p></div>
        :selEvs.map(e=>(
          <div key={e.id} style={{...S.crd,borderLeft:`4px solid ${e.color||T.pr}`,padding:'12px 14px',marginBottom:'8px'}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:'10px'}}>
              <div style={{flex:1}}>
                <p style={{margin:'0 0 2px',fontWeight:'700',color:T.tx,fontSize:'15px'}}>{e.title}</p>
                {e.time&&<p style={{margin:'0 0 2px',fontSize:'12px',color:T.mu}}>🕐 {fmtT(e.time)}</p>}
                {e.description&&<p style={{margin:0,fontSize:'13px',color:T.mu}}>{e.description}</p>}
              </div>
              <button onClick={()=>del(e.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:'20px',color:T.mu}}>×</button>
            </div>
          </div>
        ))}
      {show&&(
        <div style={S.mod} onClick={()=>setShow(false)}>
          <div style={S.mox} onClick={e=>e.stopPropagation()}>
            <p style={{margin:'0 0 16px',fontWeight:'700',color:T.pr,fontSize:'17px'}}>📅 Add Event</p>
            <label style={S.lbl}>Title *</label>
            <input style={S.inp} placeholder="Event name" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>
            <label style={S.lbl}>Description</label>
            <input style={S.inp} placeholder="Optional notes" value={form.description} onChange={e=>setForm({...form,description:e.target.value})}/>
            <label style={S.lbl}>Time</label>
            <input type="time" style={S.inp} value={form.time} onChange={e=>setForm({...form,time:e.target.value})}/>
            <label style={S.lbl}>Colour</label>
            <div style={{display:'flex',gap:'8px',marginBottom:'16px'}}>
              {COLS.map(c=><button key={c} onClick={()=>setForm({...form,color:c})} style={{width:'30px',height:'30px',borderRadius:'50%',background:c,border:form.color===c?'3px solid #333':'3px solid transparent',cursor:'pointer'}}/>)}
            </div>
            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={()=>setShow(false)} style={{...S.bot,flex:1}}>Cancel</button>
              <button onClick={save} style={{...S.btn,flex:1}}>Add Event</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function HabitsTab(){
  const[habits,setHabits]=useState([]);
  const[logs,setLogs]=useState([]);
  const[show,setShow]=useState(false);
  const[form,setForm]=useState({name:'',emoji:'🌸'});
  const today=tod();
  useEffect(()=>{setHabits(db.get('bp_habits'));setLogs(db.get('bp_hlogs'));},[]);
  const isDone=(id)=>logs.some(l=>l.habitId===id&&l.date===today);
  const toggle=(habit)=>{
    const nl=isDone(habit.id)?logs.filter(l=>!(l.habitId===habit.id&&l.date===today)):[...logs,{id:uid(),habitId:habit.id,date:today}];
    setLogs(nl);db.set('bp_hlogs',nl);
  };
  const streak=(id)=>{let s=0,d=new Date();while(true){const ds=d.toISOString().slice(0,10);if(logs.some(l=>l.habitId===id&&l.date===ds)){s++;d.setDate(d.getDate()-1);}else break;}return s;};
  const add=()=>{
    if(!form.name.trim())return;
    const h={id:uid(),name:form.name,emoji:form.emoji,active:true,createdAt:today};
    const upd=[...habits,h];setHabits(upd);db.set('bp_habits',upd);
    setForm({name:'',emoji:'🌸'});setShow(false);
  };
  const del=(id)=>{const upd=habits.filter(h=>h.id!==id);setHabits(upd);db.set('bp_habits',upd);};
  const EMOJIS=['🌸','💪','📚','🧘','💧','🏃','🎨','🎵','🍎','😴','🌿','✍️','🧠','🎯','🌟','🛁'];
  const done=habits.filter(h=>isDone(h.id)).length;
  return(
    <div style={S.sec}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}}>
        <div>
          <h2 style={{margin:0,color:T.tx,fontSize:'20px',fontWeight:'700'}}>✨ Habits</h2>
          <p style={{margin:'2px 0 0',color:T.mu,fontSize:'13px'}}>{done}/{habits.length} done today</p>
        </div>
        <button onClick={()=>setShow(true)} style={S.btn}>+ New</button>
      </div>
      {habits.length>0&&(
        <div style={{...S.crd,marginTop:'10px'}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',color:T.mu,marginBottom:'6px'}}>
            <span>Today's progress</span><span>{Math.round(habits.length?done/habits.length*100:0)}%</span>
          </div>
          <div style={{background:T.bo,borderRadius:'999px',height:'8px'}}>
            <div style={{background:`linear-gradient(90deg,${T.pr},${T.ac})`,width:`${habits.length?done/habits.length*100:0}%`,height:'100%',borderRadius:'999px',transition:'width 0.4s'}}/>
          </div>
        </div>
      )}
      {habits.length===0
        ?<div style={{...S.crd,textAlign:'center',padding:'40px 20px',marginTop:'10px'}}>
          <p style={{fontSize:'48px',margin:'0 0 10px'}}>🌱</p>
          <p style={{color:T.mu,margin:'0 0 16px'}}>Start building healthy habits!</p>
          <button onClick={()=>setShow(true)} style={S.btn}>Add your first habit</button>
        </div>
        :habits.map(h=>{const dn=isDone(h.id),st=streak(h.id);return(
          <div key={h.id} style={{...S.crd,display:'flex',alignItems:'center',gap:'12px',marginTop:'8px'}}>
            <button onClick={()=>toggle(h)} style={{width:'46px',height:'46px',borderRadius:'50%',border:`2.5px solid ${dn?T.su:T.bo}`,background:dn?T.su:'white',fontSize:'22px',cursor:'pointer',flexShrink:0,color:'white',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {dn?<span style={{fontSize:'20px'}}>✓</span>:<span>{h.emoji}</span>}
            </button>
            <div style={{flex:1}}>
              <p style={{margin:0,fontWeight:'600',color:dn?T.mu:T.tx,textDecoration:dn?'line-through':'none',fontSize:'15px'}}>{h.name}</p>
              {st>0&&<p style={{margin:'2px 0 0',fontSize:'12px',color:T.pr}}>🔥 {st} day streak</p>}
            </div>
            <button onClick={()=>del(h.id)} style={{background:'none',border:'none',cursor:'pointer',color:T.mu,fontSize:'20px',padding:'4px'}}>×</button>
          </div>
        );})}
      {show&&(
        <div style={S.mod} onClick={()=>setShow(false)}>
          <div style={S.mox} onClick={e=>e.stopPropagation()}>
            <p style={{margin:'0 0 16px',fontWeight:'700',color:T.pr,fontSize:'17px'}}>✨ New Habit</p>
            <label style={S.lbl}>Name *</label>
            <input style={S.inp} placeholder="e.g. Morning meditation" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
            <label style={S.lbl}>Choose an emoji</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'16px'}}>
              {EMOJIS.map(em=><button key={em} onClick={()=>setForm({...form,emoji:em})} style={{width:'42px',height:'42px',borderRadius:'12px',border:`2px solid ${form.emoji===em?T.pr:T.bo}`,background:form.emoji===em?T.pl:'white',fontSize:'22px',cursor:'pointer'}}>{em}</button>)}
            </div>
            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={()=>setShow(false)} style={{...S.bot,flex:1}}>Cancel</button>
              <button onClick={add} style={{...S.btn,flex:1}}>Add Habit</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TasksTab(){
  const[tasks,setTasks]=useState([]);
  const[filter,setFilter]=useState('active');
  const[show,setShow]=useState(false);
  const[form,setForm]=useState({title:'',description:'',priority:'medium',dueDate:''});
  useEffect(()=>{setTasks(db.get('bp_tasks'));},[]);
  const add=()=>{
    if(!form.title.trim())return;
    const t={id:uid(),...form,completed:false,createdAt:tod()};
    const upd=[t,...tasks];setTasks(upd);db.set('bp_tasks',upd);
    setForm({title:'',description:'',priority:'medium',dueDate:''});setShow(false);
  };
  const toggle=(id)=>{const upd=tasks.map(t=>t.id===id?{...t,completed:!t.completed}:t);setTasks(upd);db.set('bp_tasks',upd);};
  const del=(id)=>{const upd=tasks.filter(t=>t.id!==id);setTasks(upd);db.set('bp_tasks',upd);};
  const shown=tasks.filter(t=>filter==='active'?!t.completed:t.completed);
  const PR={high:['🔴','High'],medium:['🟡','Medium'],low:['🟢','Low']};
  return(
    <div style={S.sec}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
        <h2 style={{margin:0,color:T.tx,fontSize:'20px',fontWeight:'700'}}>✅ Tasks</h2>
        <button onClick={()=>setShow(true)} style={S.btn}>+ New</button>
      </div>
      <div style={{display:'flex',gap:'8px',marginBottom:'12px'}}>
        <button onClick={()=>setFilter('active')} style={S.pil(filter==='active')}>Active ({tasks.filter(t=>!t.completed).length})</button>
        <button onClick={()=>setFilter('done')} style={S.pil(filter==='done')}>Done ({tasks.filter(t=>t.completed).length})</button>
      </div>
      {shown.length===0
        ?<div style={{...S.crd,textAlign:'center',padding:'36px'}}><p style={{fontSize:'40px',margin:'0 0 8px'}}>{filter==='active'?'🎉':'📋'}</p><p style={{color:T.mu,margin:0}}>{filter==='active'?'All caught up!':'No completed tasks yet'}</p></div>
        :shown.map(t=>(
          <div key={t.id} style={{...S.crd,marginBottom:'8px'}}>
            <div style={{display:'flex',gap:'10px',alignItems:'flex-start'}}>
              <button onClick={()=>toggle(t.id)} style={{width:'24px',height:'24px',borderRadius:'50%',border:`2px solid ${t.completed?T.su:T.bo}`,background:t.completed?T.su:'white',cursor:'pointer',flexShrink:0,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',marginTop:'1px'}}>
                {t.completed?'✓':''}
              </button>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:'5px'}}>
                  <span style={{fontSize:'13px'}}>{PR[t.priority][0]}</span>
                  <span style={{fontWeight:'600',color:T.tx,textDecoration:t.completed?'line-through':'none',fontSize:'15px'}}>{t.title}</span>
                </div>
                {t.description&&<p style={{margin:'2px 0 0',fontSize:'12px',color:T.mu}}>{t.description}</p>}
                {t.dueDate&&<p style={{margin:'2px 0 0',fontSize:'11px',color:T.pr}}>📅 {fmtD(t.dueDate)}</p>}
              </div>
              <button onClick={()=>del(t.id)} style={{background:'none',border:'none',cursor:'pointer',color:T.mu,fontSize:'20px'}}>×</button>
            </div>
          </div>
        ))}
      {show&&(
        <div style={S.mod} onClick={()=>setShow(false)}>
          <div style={S.mox} onClick={e=>e.stopPropagation()}>
            <p style={{margin:'0 0 16px',fontWeight:'700',color:T.pr,fontSize:'17px'}}>✅ New Task</p>
            <label style={S.lbl}>Title *</label>
            <input style={S.inp} placeholder="What needs doing?" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>
            <label style={S.lbl}>Description</label>
            <input style={S.inp} placeholder="Optional details" value={form.description} onChange={e=>setForm({...form,description:e.target.value})}/>
            <label style={S.lbl}>Priority</label>
            <div style={{display:'flex',gap:'8px',marginBottom:'10px'}}>
              {Object.entries(PR).map(([k,[ic,lb]])=>(
                <button key={k} onClick={()=>setForm({...form,priority:k})} style={{flex:1,padding:'8px 4px',border:`2px solid ${form.priority===k?T.pr:T.bo}`,borderRadius:'10px',background:form.priority===k?T.pl:'white',cursor:'pointer',fontSize:'13px',fontWeight:'600',color:T.tx}}>
                  {ic} {lb}
                </button>
              ))}
            </div>
            <label style={S.lbl}>Due Date</label>
            <input type="date" style={S.inp} value={form.dueDate} onChange={e=>setForm({...form,dueDate:e.target.value})}/>
            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={()=>setShow(false)} style={{...S.bot,flex:1}}>Cancel</button>
              <button onClick={add} style={{...S.btn,flex:1}}>Add Task</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function JournalSection({onBack}){
  const[entries,setEntries]=useState([]);
  const[show,setShow]=useState(false);
  const[form,setForm]=useState({content:'',mood:'🙂'});
  const MOODS=['😄','🙂','😐','😕','😢','😤','😰','🥰','😴','🤔'];
  useEffect(()=>{setEntries(db.get('bp_journal'));},[]);
  const add=()=>{
    if(!form.content.trim())return;
    const e={id:uid(),date:tod(),...form};
    const upd=[e,...entries];setEntries(upd);db.set('bp_journal',upd);
    setForm({content:'',mood:'🙂'});setShow(false);
  };
  const del=(id)=>{const upd=entries.filter(e=>e.id!==id);setEntries(upd);db.set('bp_journal',upd);};
  return(
    <div style={S.sec}>
      <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
        <button onClick={onBack} style={{...S.bot,padding:'7px 14px'}}>‹ Back</button>
        <h2 style={{margin:0,color:T.tx,fontSize:'20px',fontWeight:'700',flex:1}}>📝 Journal</h2>
        <button onClick={()=>setShow(true)} style={S.bsm}>+ Write</button>
      </div>
      {entries.length===0
        ?<div style={{...S.crd,textAlign:'center',padding:'40px 20px'}}><p style={{fontSize:'48px',margin:'0 0 10px'}}>📖</p><p style={{color:T.mu,margin:0}}>Your journal is empty. Start writing!</p></div>
        :entries.map(e=>(
          <div key={e.id} style={{...S.crd,marginBottom:'10px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
              <span style={{fontSize:'12px',color:T.mu,fontWeight:'600'}}>{fmtD(e.date)}</span>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <span style={{fontSize:'22px'}}>{e.mood}</span>
                <button onClick={()=>del(e.id)} style={{background:'none',border:'none',cursor:'pointer',color:T.mu,fontSize:'18px'}}>×</button>
              </div>
            </div>
            <p style={{margin:0,color:T.tx,fontSize:'14px',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>{e.content}</p>
          </div>
        ))}
      {show&&(
        <div style={S.mod} onClick={()=>setShow(false)}>
          <div style={S.mox} onClick={e=>e.stopPropagation()}>
            <p style={{margin:'0 0 14px',fontWeight:'700',color:T.pr,fontSize:'17px'}}>📝 New Entry</p>
            <label style={S.lbl}>Feeling</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'12px'}}>
              {MOODS.map(m=><button key={m} onClick={()=>setForm({...form,mood:m})} style={{fontSize:'24px',padding:'4px',border:form.mood===m?`2px solid ${T.pr}`:'2px solid transparent',borderRadius:'8px',background:'none',cursor:'pointer'}}>{m}</button>)}
            </div>
            <label style={S.lbl}>What's on your mind? *</label>
            <textarea style={{...S.inp,minHeight:'130px',resize:'vertical'}} placeholder="Write your thoughts..." value={form.content} onChange={e=>setForm({...form,content:e.target.value})}/>
            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={()=>setShow(false)} style={{...S.bot,flex:1}}>Cancel</button>
              <button onClick={add} style={{...S.btn,flex:1}}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function BudgetSection({onBack}){
  const[txs,setTxs]=useState([]);
  const[show,setShow]=useState(false);
  const[form,setForm]=useState({title:'',amount:'',isIncome:false,category:'Other'});
  const CATS=['Food','Transport','Bills','Shopping','Health','Entertainment','Salary','Freelance','Other'];
  useEffect(()=>{setTxs(db.get('bp_budget'));},[]);
  const add=()=>{
    if(!form.title.trim()||!form.amount)return;
    const t={id:uid(),date:tod(),title:form.title,amount:parseFloat(form.amount),isIncome:form.isIncome,category:form.category};
    const upd=[t,...txs];setTxs(upd);db.set('bp_budget',upd);
    setForm({title:'',amount:'',isIncome:false,category:'Other'});setShow(false);
  };
  const del=(id)=>{const upd=txs.filter(t=>t.id!==id);setTxs(upd);db.set('bp_budget',upd);};
  const income=txs.filter(t=>t.isIncome).reduce((s,t)=>s+t.amount,0);
  const expense=txs.filter(t=>!t.isIncome).reduce((s,t)=>s+t.amount,0);
  const balance=income-expense;
  return(
    <div style={S.sec}>
      <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
        <button onClick={onBack} style={{...S.bot,padding:'7px 14px'}}>‹ Back</button>
        <h2 style={{margin:0,color:T.tx,fontSize:'20px',fontWeight:'700',flex:1}}>💰 Budget</h2>
        <button onClick={()=>setShow(true)} style={S.bsm}>+ Add</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',marginBottom:'10px'}}>
        {[['Balance',balance,balance>=0?T.su:T.da],['Income',income,T.su],['Expenses',expense,T.da]].map(([lb,am,co])=>(
          <div key={lb} style={{...S.crd,textAlign:'center',padding:'12px 6px'}}>
            <p style={{margin:'0 0 4px',fontSize:'10px',color:T.mu,fontWeight:'700',textTransform:'uppercase'}}>{lb}</p>
            <p style={{margin:0,fontWeight:'800',color:co,fontSize:'14px'}}>£{Math.abs(am).toFixed(2)}</p>
          </div>
        ))}
      </div>
      {txs.length===0
        ?<div style={{...S.crd,textAlign:'center',padding:'40px'}}><p style={{fontSize:'40px',margin:'0 0 8px'}}>💳</p><p style={{color:T.mu,margin:0}}>No transactions yet</p></div>
        :txs.map(t=>(
          <div key={t.id} style={{...S.crd,display:'flex',alignItems:'center',gap:'10px',marginBottom:'6px'}}>
            <span style={{fontSize:'22px'}}>{t.isIncome?'💚':'💸'}</span>
            <div style={{flex:1}}>
              <p style={{margin:0,fontWeight:'600',color:T.tx,fontSize:'14px'}}>{t.title}</p>
              <p style={{margin:'1px 0 0',fontSize:'11px',color:T.mu}}>{t.category} · {fmtD(t.date)}</p>
            </div>
            <span style={{fontWeight:'800',color:t.isIncome?T.su:T.da,fontSize:'14px'}}>{t.isIncome?'+':'-'}£{t.amount.toFixed(2)}</span>
            <button onClick={()=>del(t.id)} style={{background:'none',border:'none',cursor:'pointer',color:T.mu,fontSize:'18px'}}>×</button>
          </div>
        ))}
      {show&&(
        <div style={S.mod} onClick={()=>setShow(false)}>
          <div style={S.mox} onClick={e=>e.stopPropagation()}>
            <p style={{margin:'0 0 14px',fontWeight:'700',color:T.pr,fontSize:'17px'}}>💰 New Transaction</p>
            <div style={{display:'flex',gap:'8px',marginBottom:'12px'}}>
              <button onClick={()=>setForm({...form,isIncome:false})} style={{flex:1,...(!form.isIncome?S.btn:S.bot)}}>💸 Expense</button>
              <button onClick={()=>setForm({...form,isIncome:true})} style={{flex:1,...(form.isIncome?S.btn:S.bot)}}>💚 Income</button>
            </div>
            <label style={S.lbl}>Description *</label>
            <input style={S.inp} placeholder="e.g. Groceries" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>
            <label style={S.lbl}>Amount (£) *</label>
            <input type="number" style={S.inp} placeholder="0.00" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}/>
            <label style={S.lbl}>Category</label>
            <select style={S.inp} value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
              {CATS.map(c=><option key={c}>{c}</option>)}
            </select>
            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={()=>setShow(false)} style={{...S.bot,flex:1}}>Cancel</button>
              <button onClick={add} style={{...S.btn,flex:1}}>Add</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function GoalsSection({onBack}){
  const[goals,setGoals]=useState([]);
  const[show,setShow]=useState(false);
  const[form,setForm]=useState({title:'',description:'',targetDate:'',emoji:'🎯'});
  const EMOJIS=['🎯','💪','📚','🏃','✈️','🎨','💰','🌟','❤️','🏠','🎓','🧘','🌸','🏋️','🍎'];
  useEffect(()=>{setGoals(db.get('bp_goals'));},[]);
  const add=()=>{
    if(!form.title.trim())return;
    const g={id:uid(),...form,progress:0,createdAt:tod()};
    const upd=[...goals,g];setGoals(upd);db.set('bp_goals',upd);
    setForm({title:'',description:'',targetDate:'',emoji:'🎯'});setShow(false);
  };
  const updP=(id,delta)=>{const upd=goals.map(g=>g.id===id?{...g,progress:Math.min(100,Math.max(0,g.progress+delta))}:g);setGoals(upd);db.set('bp_goals',upd);};
  const del=(id)=>{const upd=goals.filter(g=>g.id!==id);setGoals(upd);db.set('bp_goals',upd);};
  return(
    <div style={S.sec}>
      <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
        <button onClick={onBack} style={{...S.bot,padding:'7px 14px'}}>‹ Back</button>
        <h2 style={{margin:0,color:T.tx,fontSize:'20px',fontWeight:'700',flex:1}}>🎯 Goals</h2>
        <button onClick={()=>setShow(true)} style={S.bsm}>+ New</button>
      </div>
      {goals.length===0
        ?<div style={{...S.crd,textAlign:'center',padding:'40px 20px'}}><p style={{fontSize:'48px',margin:'0 0 10px'}}>🌟</p><p style={{color:T.mu,margin:'0 0 16px'}}>Set goals and start achieving!</p><button onClick={()=>setShow(true)} style={S.btn}>Add your first goal</button></div>
        :goals.map(g=>(
          <div key={g.id} style={{...S.crd,marginBottom:'10px'}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:'10px',marginBottom:'10px'}}>
              <span style={{fontSize:'28px'}}>{g.emoji}</span>
              <div style={{flex:1}}>
                <p style={{margin:0,fontWeight:'700',color:T.tx,fontSize:'15px'}}>{g.title}</p>
                {g.description&&<p style={{margin:'2px 0 0',fontSize:'13px',color:T.mu}}>{g.description}</p>}
                {g.targetDate&&<p style={{margin:'2px 0 0',fontSize:'12px',color:T.pr}}>🗓️ Target: {fmtD(g.targetDate)}</p>}
              </div>
              <button onClick={()=>del(g.id)} style={{background:'none',border:'none',cursor:'pointer',color:T.mu,fontSize:'20px'}}>×</button>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
              <div style={{flex:1,background:T.bo,borderRadius:'999px',height:'10px',overflow:'hidden'}}>
                <div style={{width:`${g.progress}%`,background:`linear-gradient(90deg,${T.pr},${T.ac})`,height:'100%',borderRadius:'999px',transition:'width 0.4s'}}/>
              </div>
              <span style={{fontWeight:'800',color:T.tx,minWidth:'38px',fontSize:'14px'}}>{g.progress}%</span>
            </div>
            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={()=>updP(g.id,-10)} style={{...S.bot,flex:1,padding:'7px'}}>− 10%</button>
              <button onClick={()=>updP(g.id,10)} style={{...S.btn,flex:1,padding:'7px'}}>+ 10%</button>
            </div>
          </div>
        ))}
      {show&&(
        <div style={S.mod} onClick={()=>setShow(false)}>
          <div style={S.mox} onClick={e=>e.stopPropagation()}>
            <p style={{margin:'0 0 14px',fontWeight:'700',color:T.pr,fontSize:'17px'}}>🎯 New Goal</p>
            <label style={S.lbl}>Emoji</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'12px'}}>
              {EMOJIS.map(em=><button key={em} onClick={()=>setForm({...form,emoji:em})} style={{width:'42px',height:'42px',borderRadius:'12px',border:`2px solid ${form.emoji===em?T.pr:T.bo}`,background:form.emoji===em?T.pl:'white',fontSize:'22px',cursor:'pointer'}}>{em}</button>)}
            </div>
            <label style={S.lbl}>Goal *</label>
            <input style={S.inp} placeholder="What do you want to achieve?" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>
            <label style={S.lbl}>Why is this important?</label>
            <input style={S.inp} placeholder="Your motivation..." value={form.description} onChange={e=>setForm({...form,description:e.target.value})}/>
            <label style={S.lbl}>Target Date</label>
            <input type="date" style={S.inp} value={form.targetDate} onChange={e=>setForm({...form,targetDate:e.target.value})}/>
            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={()=>setShow(false)} style={{...S.bot,flex:1}}>Cancel</button>
              <button onClick={add} style={{...S.btn,flex:1}}>Add Goal</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function MoreTab(){
  const[sec,setSec]=useState('menu');
  if(sec==='journal')return<JournalSection onBack={()=>setSec('menu')}/>;
  if(sec==='budget')return<BudgetSection onBack={()=>setSec('menu')}/>;
  if(sec==='goals')return<GoalsSection onBack={()=>setSec('menu')}/>;
  return(
    <div style={S.sec}>
      <h2 style={{color:T.tx,margin:'0 0 14px',fontSize:'20px',fontWeight:'700'}}>⋯ More</h2>
      {[{id:'journal',ic:'📝',ti:'Journal',de:'Daily reflections & thoughts'},{id:'budget',ic:'💰',ti:'Budget',de:'Track income & expenses'},{id:'goals',ic:'🎯',ti:'Goals',de:'Set & track your goals'}].map(item=>(
        <button key={item.id} onClick={()=>setSec(item.id)} style={{...S.crd,width:'100%',textAlign:'left',cursor:'pointer',display:'flex',alignItems:'center',gap:'14px',marginBottom:'10px',border:`1px solid ${T.bo}`}}>
          <div style={{width:'48px',height:'48px',borderRadius:'14px',background:T.pl,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'26px',flexShrink:0}}>{item.ic}</div>
          <div style={{flex:1}}>
            <p style={{margin:0,fontWeight:'700',color:T.tx,fontSize:'16px'}}>{item.ti}</p>
            <p style={{margin:'2px 0 0',color:T.mu,fontSize:'13px'}}>{item.de}</p>
          </div>
          <span style={{color:T.mu,fontSize:'20px'}}>›</span>
        </button>
      ))}
    </div>
  );
}

function App(){
  const[tab,setTab]=useState('home');
  const pages={home:<HomeTab/>,calendar:<CalendarTab/>,habits:<HabitsTab/>,tasks:<TasksTab/>,more:<MoreTab/>};
  return(
    <div style={S.app}>
      <div style={S.hdr}>
        <h1 style={{margin:0,fontSize:'20px',fontWeight:'800',letterSpacing:'0.3px'}}>🌸 Bloom Planner</h1>
        <p style={{margin:'1px 0 0',fontSize:'12px',opacity:0.85}}>{new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
      </div>
      <div style={{paddingTop:'4px'}}>{pages[tab]}</div>
      <nav style={S.nav}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'10px 4px 8px',border:'none',background:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',color:tab===t.id?T.pr:T.mu}}>
            <span style={{fontSize:'22px'}}>{t.ic}</span>
            <span style={{fontSize:'10px',fontWeight:tab===t.id?'800':'500'}}>{t.lb}</span>
            {tab===t.id&&<div style={{width:'4px',height:'4px',borderRadius:'50%',background:T.pr}}/>}
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
